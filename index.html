<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>저희의 결혼식에 초대합니다</title>
    <meta name="description" content="2026년 6월, 저희 두 사람이 하나가 되는 자리에 모십니다.">
    <meta property="og:title" content="연재 & 선홍 결혼합니다">
    <meta property="og:description" content="2026. 06. 27. 토요일 오후 6:00">
    <meta property="og:image" content="https://mangekyou93.github.io/yhwedding0627/files/images/pictures/thumbnail_image.jpg">
    <meta property="og:url" content="https://mangekyou93.github.io/yhwedding0627/">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="css/index.css">
    <script type="text/javascript" src="js/index.js"></script>

</head>
    <body>
        <!--
        7. 달력
        8. 연재♥선홍 의 결혼식 103일 전
        9. 이미지 갤러리
        10. 결혼식장 장소(맵 API 활용)
        11. 계좌번호
        12. 방명록
        13. 카카오톡으로 공유하기
        14. 청첩장 주소 복사하기
        -->

        <div id="root">
            <div style="display:none; justify-content:center; align-items:center; height:100vh;">
                <p>초대장을 불러오는 중입니다...</p>
            </div>

            <div id="invitation-card">
                <!-- 1. 오디오 -->
                <div id="audio-section">
                    <button onclick="toggleAudio()">
                        <img id="bgm-icon" src="files/images/icons/pause.svg" alt="bgm">
                    </button>
                    <audio id="bgm" loop autoplay>
                        <source src="files/bgm/music.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <!-- 2. 신랑 신부 이름 -->
                <section id="names">
                    <h5>SAVE THE DATE</h5>
                    <h2>
                        <!--❤️🧡💛💚💙💜🖤🤍🤎🩶🩵🩷 -->
                        <!--🫰❣️💕💞💓💗💖💘💝💟❤️‍🔥❤️‍🩹 -->
                        연재 <span>💜</span> 선홍
                    </h2>
                </section>

                <!-- 3. 신랑/신부 메인 사진 or 동영상 -->
                <section id="main-visual" style="padding: 0;">
                    <div>
                        <img src="/files/images/pictures/main_image.jpg" alt="메인 사진">
                    </div>
                </section>

                <!-- 4. 장소(텍스트) -->
                <section id="main-info">
                    <p>
                        2026년 06월 27일 토요일 오후 06시 00분<br>
                        더뉴컨벤션 웨딩홀 2층 더뉴홀
                    </p>
                </section>

                <!-- 5. 웰컴(결혼 청첩장) 문구 -->
                <section id="welcome-message">
                    <div class="welcome-flower">🌸</div>
                    <h5 class="welcome-title">INVITATION</h5>
                    <div class="welcome-text">
                        <p>봄처럼 포근하고 여름처럼 뜨겁고</p>
                        <p>가을처럼 충만하고 겨울처럼 설레는 사람을 만났습니다.</p>
                        <p>이제 서로의 모든 계절을 지나려 합니다.</p>
                        <br>
                        <p>가장 빛나는 날,</p>
                        <p>늘 곁에서 아껴준 고마운 분들을 초대합니다.</p>
                    </div>
                </section>

                <!-- 6. 양가부모님 성함 + 신랑 신부 이름 + 연락처 메세지 보내기 -->
                
            </div>
        </div>
    </body>
</html>
